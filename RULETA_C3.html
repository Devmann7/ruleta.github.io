<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=1080, height=1920, initial-scale=1.0"
    />
    <title>Ruleta Cummins</title>

    <style>
      body {
        background: #000;
        margin: 0;
        font-family: Arial;
        display: flex;
        justify-content: center;
      }

      #pantalla {
        width: 1080px;
        height: 1920px;
        background: #da291c;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        position: relative;
      }

      .logo img {
        width: 250px;
        margin-top: 10px;
      }

      .contenedor {
        position: relative;
        width: 720px;
        height: 720px;
        margin-top: 30px;
      }

      canvas {
        width: 100%;
        height: 100%;
      }

      .flecha {
        position: absolute;
        top: 0px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 30px solid transparent;
        border-right: 30px solid transparent;
        border-top: 50px solid rgb(168, 20, 20);
        z-index: 10;
      }

      #girar {
        margin-top: 60px;
        padding: 20px 60px;
        font-size: 32px;
        border: none;
        border-radius: 12px;
        background: #1c0202;
        color: white;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
      }

      #girar:hover {
        background: #b80000;
      }

      .qr-section {
        flex: 1;
        margin-top: 20px;
        text-align: center;
      }

      p {
        font-size: 35px;
        margin-bottom: 15px;
      }

      .qr {
        width: 240px;
        justify-content: center;
      }

      .redes {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
      }

      .redes img {
        width: 75px;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: 0.3s;
        z-index: 1000;
      }

      .modal.show {
        visibility: visible;
        opacity: 1;
      }

      .modal-content {
        background: white;
        color: black;
        padding: 50px 70px;
        border-radius: 20px;
        font-size: 30px;
        font-weight: bold;
        box-shadow: 0 0 40px gold;
        text-align: center;
        max-height: 85vh;
        overflow-y: auto;
      }

      .modal-content h3 {
        font-size: 36px;
        margin-bottom: 25px;
        color: #da291c;
      }

      .stockRow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 40px;
        margin: 15px 0;
      }

      .stockRow label {
        font-size: 28px;
        text-align: left;
        flex: 1;
      }

      .stockRow input {
        width: 140px;
        font-size: 28px;
        padding: 8px 10px;
        text-align: center;
        border-radius: 6px;
        border: 2px solid #aaa;
      }

      .modal-content button {
        margin-top: 30px;
        padding: 18px 50px;
        font-size: 28px;
        font-weight: bold;
        background: #e60000;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      .modal-content button:hover {
        background: #b80000;
      }

      .footer {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
      }

      .stockPanel {
        display: none;
        flex: 2;
        background: #111;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #333;
      }

      .stockPanel h3 {
        margin-top: 0;
        text-align: center;
      }

      .stockPanel table {
        border-collapse: collapse;
        color: white;
        font-size: 18px;
      }

      .stockPanel td,
      .stockPanel th {
        border: 1px solid #333;
        padding: 6px 10px;
        text-align: center;
      }

      .stockPanel th {
        background: #e60000;
      }

      #btnInventario {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        font-size: 22px;
        border: none;
        border-radius: 8px;
        background: #e60000;
        color: white;
        cursor: pointer;
      }

      #btnInventario:hover {
        background: #b80000;
      }
    </style>
  </head>

  <body>
    <div id="pantalla">
      <div class="logo">
        <img src="img/logo.png" />
        <button id="btnInventario">📦</button>
      </div>

      <div class="contenedor">
        <div class="flecha"></div>
        <br />
        <canvas id="ruleta" width="600" height="600"></canvas>
      </div>
      <br />
      <button id="grid" style="display:none;"></button> <button id="girar">GIRAR RULETA</button>
      <br /><br /><br /><br /><br /><br />
      <p>¡Síguenos en nuestras redes Sociales y gana!</p>

      <div class="footer">
        <div class="qr-section">
          <img class="qr" src="img/qr.png" />
          <div class="redes">
            <img src="img/linkedin.png" />
            <img src="img/instagram.png" />
            <img src="img/facebook.png" />
          </div>
        </div>

        <div class="stockPanel">
          <h3>INVENTARIO</h3>
          <table id="tablaStock">
            <tr>
              <th>Premio</th>
              <th>Stock</th>
              <th>Entregados</th>
            </tr>
          </table>
        </div>
      </div>

      <div id="modalGanador" class="modal">
        <div class="modal-content" id="ganadorTexto" style="font-size: 45px; padding: 60px;"></div>
      </div>

      <div id="popupStock" class="modal show">
        <div class="modal-content">
          <h3>Configurar Stock Inicial</h3>

          <div class="stockRow">
            <label>Jockey</label>
            <input id="stock_Jockey" type="number" value="50" />
          </div>
          <div class="stockRow">
            <label>Botella</label>
            <input id="stock_Botella" type="number" value="50" />
          </div>
          <div class="stockRow">
            <label>Mug Tértmico</label>
            <input id="stock_Mug" type="number" value="24" />
          </div>
          <div class="stockRow">
            <label>Libreta</label>
            <input id="stock_Libreta" type="number" value="50" />
          </div>
          <div class="stockRow">
            <label>Bandana</label>
            <input id="stock_Bandana" type="number" value="100" />
          </div>
          <div class="stockRow">
            <label>Premio Sorpresa</label>
            <input id="stock_Sorpresa" type="number" value="5" />
          </div>

          <button onclick="iniciarJuego()">INICIAR RULETA</button>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("ruleta");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const centroX = 300;
      const centroY = 300;
      const radioRuleta = 260;
      const radioLuces = 280;
      const radioMetal = 300;
      let opciones = [];
      let imagenes = [];
      let anguloInicio = 0;
      let girando = false;
      let frameLuces = 0;
      let velocidadLuces = 18;
      let inventario = {};
      let premiosEntregados = {};
      let premioGanadorActual = null; // Guardará el premio obtenido por backend/lógica antes de girar

      async function cargarOpciones() {
        const listaPremios = [
          { nombre: "Jockey", archivo: "Jockey.png" },
          { nombre: "Botella", archivo: "bottle.png" },
          { nombre: "Bandana", archivo: "Bandana.png" },
          { nombre: "Mug Termico", archivo: "Mug.png" },
          { nombre: "Libreta", archivo: "Libreta.jpeg" },
          { nombre: "Premio Sorpresa", archivo: "cajaregalo.png" },
        ];

        for (let item of listaPremios) {
          let img = new Image();
          img.src = "opciones/" + item.archivo;
          await new Promise((res) => (img.onload = res));
          imagenes.push(img);
          opciones.push(item.nombre);
        }
        dibujar();
      }

      function iniciarJuego() {
        inventario = {
          "Jockey": Number(document.getElementById("stock_Jockey").value),
          "Botella": Number(document.getElementById("stock_Botella").value),
          "Mug Termico": Number(document.getElementById("stock_Mug").value),
          "Libreta": Number(document.getElementById("stock_Libreta").value),
          "Bandana": Number(document.getElementById("stock_Bandana").value),
          "Premio Sorpresa": Number(document.getElementById("stock_Sorpresa").value),
        }; 

        for (let item in inventario) {
          premiosEntregados[item] = 0;
        }
        document.getElementById("popupStock").classList.remove("show");
        actualizarTabla();
      }

      function actualizarTabla() {
        const tabla = document.getElementById("tablaStock");
        if(!tabla) return;
        tabla.innerHTML = `
        <tr>
          <th>Premio</th>
          <th>Stock</th>
          <th>Entregados</th>
        </tr>`;

        for (let premio in inventario) {
          tabla.innerHTML += `
          <tr>
            <td>${premio}</td>
            <td>${inventario[premio]}</td>
            <td>${premiosEntregados[premio]}</td>
          </tr>`;
        }
      }

      function dibujarBordeMetalico() {
        let gradiente = ctx.createRadialGradient(
          centroX, centroY, 230, centroX, centroY, 300
        );
        gradiente.addColorStop(0, "#2b2b2b");
        gradiente.addColorStop(0.2, "#3a3a3a");
        gradiente.addColorStop(0.35, "#5a5a5a");
        gradiente.addColorStop(0.5, "#1f1f1f");
        gradiente.addColorStop(0.65, "#4a4a4a");
        gradiente.addColorStop(0.8, "#2a2a2a");
        gradiente.addColorStop(1, "#0f0f0f");

        ctx.beginPath();
        ctx.arc(centroX, centroY, radioMetal, 0, Math.PI * 2);
        ctx.fillStyle = gradiente;
        ctx.fill();
      }

      function dibujarLuces() {
        let total = 44;
        for (let i = 0; i < total; i++) {
          let angulo = (i / total) * Math.PI * 2;
          let x = centroX + Math.cos(angulo) * radioLuces;
          let y = centroY + Math.sin(angulo) * radioLuces;
          ctx.beginPath();
          let encendida = (i + Math.floor(frameLuces / velocidadLuces)) % 2 === 0;
          ctx.fillStyle = encendida ? "#ffd700" : "#5a4a00";
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fill();
        }
        frameLuces++;
      }

      function dibujarRuleta() {
        const total = opciones.length;
        const angulo = (2 * Math.PI) / total;

        for (let i = 0; i < total; i++) {
          ctx.beginPath();
          ctx.fillStyle = i % 2 === 0 ? "#fff" : "#d40000";
          ctx.moveTo(centroX, centroY);
          ctx.arc(
            centroX, centroY, radioRuleta,
            anguloInicio + i * angulo,
            anguloInicio + (i + 1) * angulo
          );
          ctx.fill();
          
          ctx.save();
          ctx.translate(centroX, centroY);
          // Rotación ajustada al centro de cada segmento de la porción de ruleta
          ctx.rotate(anguloInicio + i * angulo + angulo / 2);
          ctx.drawImage(imagenes[i], 140, -35, 70, 70);
          ctx.restore();
        }
      }

      function dibujar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dibujarBordeMetalico();
        if (opciones.length > 0) {
          dibujarRuleta();
        }
        dibujarLuces();
      }

      function anunciarGanador() {
        const ganador = premioGanadorActual;

        if (ganador && inventario[ganador] > 0) {
          inventario[ganador]--;
          premiosEntregados[ganador]++;
          actualizarTabla();
          mostrarMensaje("🎉 ¡Ganaste " + ganador + "!");
        } else {
          mostrarMensaje("❌ SIN STOCK O ERROR");
        }
      }

      // Sistema Unificado de Probabilidades Basado en Pesos Reales
      function elegirPremioPorPesoYStock() {
        let bolsa = [];
        
        // Configuración limpia de pesos modificable
        const configuracionPesos = {
          "Jockey": 50,
          "Botella": 50,
          "Mug Termico": 24,
          "Libreta": 50,
          "Bandana": 100,
          "Premio Sorpresa": 5 // Muy baja probabilidad intencional
        };

        for (let premio in inventario) {
          let stock = inventario[premio];
          if (stock <= 0) continue; 

          let peso = configuracionPesos[premio] || 10;
          for (let i = 0; i < peso; i++) {
            bolsa.push(premio);
          }
        }

        if (bolsa.length === 0) return null;
        return bolsa[Math.floor(Math.random() * bolsa.length)];
      }

      function girarRuleta() {
        if (girando) return;

        const premioElegido = elegirPremioPorPesoYStock();
        
        if (!premioElegido) {
          mostrarMensaje("❌ ¡YA NO QUEDAN PREMIOS!");
          return;
        }

        premioGanadorActual = premioElegido; // Fijamos el premio inequívocamente
        girando = true;
        
        const total = opciones.length;
        const anguloPorSeccion = (2 * Math.PI) / total;

        // Encontrar índice del premio seleccionado en la ruleta visual
        const indiceGanador = opciones.indexOf(premioGanadorActual);

        const vueltas = 6 + Math.floor(Math.random() * 4); 
        
        // MATEMÁTICA EXACTA DE COLISIÓN CON LA FLECHA SUPERIOR (Ubicada a las 12 en punto / -90 grados)
        // Calculamos cuánto rotar para que el centro exacto del slice quede apuntando arriba.
        const anguloMeta = (2 * Math.PI) - (indiceGanador * anguloPorSeccion) - (anguloPorSeccion / 2) - (Math.PI / 2);
        
        // Normalizamos el ángulo final sumándole las vueltas completas
        const anguloFinal = (vueltas * 2 * Math.PI) + ((anguloMeta + (2 * Math.PI)) % (2 * Math.PI));

        const duracion = 5000; // Reducido a 5 segundos para mantener mejor ritmo de juego
        const inicio = performance.now();

        function animar(t) {
          let progreso = Math.min((t - inicio) / duracion, 1);
          const ease = (t) => 1 - Math.pow(1 - t, 4); // Desaceleración fluida tipo Quartic
          
          anguloInicio = anguloFinal * ease(progreso);
          dibujar();

          if (progreso < 1) {
            requestAnimationFrame(animar);
          } else {
            girando = false;
            anguloInicio = anguloInicio % (2 * Math.PI);
            anunciarGanador(); 
          }
        }
        requestAnimationFrame(animar);
      }

      function animarLuces() {
        if (!girando) {
          dibujar(); // Sigue parpadeando el borde de luces aun detenido
        }
        requestAnimationFrame(animarLuces);
      }

      function actualizarTablaPopup() {
        const tabla = document.getElementById("tablaStockPopup");
        if(!tabla) return;
        tabla.innerHTML = `
        <tr>
          <th>Premio</th>
          <th>Stock</th>
          <th>Entregados</th>
        </tr>`;

        for (let premio in inventario) {
          tabla.innerHTML += `
          <tr>
            <td>${premio}</td>
            <td>${inventario[premio]}</td>
            <td>${premiosEntregados[premio]}</td>
          </tr>`;
        }
      }

      document.getElementById("btnInventario").onclick = () => {
        document.getElementById("modalInventario").classList.add("show");
        actualizarTablaPopup();
      };

      function cerrarInventario() {
        document.getElementById("modalInventario").classList.remove("show");
      }

      function mostrarMensaje(texto) {
        const modal = document.getElementById("modalGanador");
        const contenido = document.getElementById("ganadorTexto");
        contenido.innerText = texto;
        modal.classList.add("show");
        modal.onclick = () => {
          modal.classList.remove("show");
        };
      }

      document.getElementById("girar").addEventListener("click", girarRuleta);
      cargarOpciones();
      animarLuces();
    </script>

    <div id="modalInventario" class="modal">
      <div class="modal-content">
        <h3>INVENTARIO ACTUAL</h3>
        <table id="tablaStockPopup">
          <tr>
            <th>Premio</th>
            <th>Stock</th>
            <th>Entregados</th>
          </tr>
        </table>
        <br />
        <button onclick="cerrarInventario()">CERRAR</button>
      </div>
    </div>
  </body>
</html>
